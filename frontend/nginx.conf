server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # Proxy API calls to gateway
  location /auth/ {
    proxy_pass http://gateway:3000/auth/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /orders/ {
    proxy_pass http://gateway:3000/orders/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /tracking/ {
    proxy_pass http://gateway:3000/tracking/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /notifications/ {
    proxy_pass http://gateway:3000/notifications/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /analytics/ {
    proxy_pass http://gateway:3000/analytics/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # React Router — all other routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
